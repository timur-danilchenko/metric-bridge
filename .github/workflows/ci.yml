# .github/workflows/ci.yml
name: CI

on:
  push:
    branches:
      - feature/*
  pull_request:
    branches:
      - master

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metrics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: bitnami/kafka:latest
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_CFG_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          ALLOW_PLAINTEXT_LISTENER: yes
        ports:
          - 9092:9092
        # Add healthchecks
        # options: >-
        #   --health-cmd "curl -f localhost:9092 || exit 1"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 10

      zookeeper:
        image: bitnami/zookeeper:latest
        env:
          ALLOW_ANONYMOUS_LOGIN: yes
        ports:
          - 2181:2181
        # Add healthchecks
        # options: >-
        #   --health-cmd "echo ruok | nc localhost 2181 | grep imok"
        #   --health-interval 10s
        #   --health-timeout 5s
        #   --health-retries 10

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: metrics
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: disable
      DB_INTEGRATION_DSN: postgres://postgres:postgres@localhost:5432/metrics?sslmode=disable

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Wait for Kafka and Postgres
      run: sleep 20

    - name: Install Goose
      run: go install github.com/pressly/goose/v3/cmd/goose@latest

    - name: Install dependencies
      run: go mod tidy

    - name: Run DB migrations
      run: make migrate_up

    - name: Run integration tests
      run: make test_integration
