name: CI

on:
  push:
    branches:
      - feature/*
  pull_request:
    branches:
      - master

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    env:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: metrics
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: disable
      DB_INTEGRATION_DSN: postgres://postgres:postgres@localhost:5432/metrics?sslmode=disable
      KAFKA_BROKERS: kafka:9092

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Set up Docker Compose services
        run: docker-compose -f docker/docker-compose.test.yml up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for Postgres..."
          until docker exec $(docker ps -qf "name=postgres") pg_isready -U postgres; do
            sleep 2
          done

          echo "Waiting for Kafka port..."
          until nc -z localhost 9092; do
            sleep 2
          done

      - name: Install dependencies
        run: go mod tidy

      - name: Run DB migrations
        run: make migrate_up

      - name: Run integration tests
        run: make test_integration
